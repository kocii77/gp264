<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExpenseBuddy – Categories</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 200px;
  --green: #2ecc71;
  --red:   #e74c3c;
  --blue:  #00bcd4;
  --card:  88px;
  --gap:   20px;
  --step:  108px; /* 88 + 20 */
}

body {
  font-family: 'Poppins', sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #fff;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 200px;
  min-height: 100vh;
  background: #000;
  display: flex;
  flex-direction: column;
  padding-top: 20px;
  flex-shrink: 0;
  z-index: 20;
}
.nav-item {
  display: block;
  padding: 28px 30px;
  color: #fff;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: background .25s, padding-left .25s;
  user-select: none;
}
.nav-item:hover  { background: #333; padding-left: 36px; }
.nav-item.active { background: #222; }
.nav-arrow {
  display: inline-block;
  margin-right: 10px;
  font-size: 18px;
  line-height: 1;
  transition: transform .25s;
}
.nav-item:hover .nav-arrow { transform: translateX(5px); }

/* ── PAGE SYSTEM ── */
.page-wrapper { flex: 1; position: relative; overflow: hidden; }

.page {
  position: absolute; inset: 0;
  background: #fff;
  transition: transform .42s cubic-bezier(.4,0,.2,1), opacity .42s;
}
.page.active    { transform: translateX(0);     opacity: 1; pointer-events: all; }
.page.off-right { transform: translateX(100%);  opacity: 0; pointer-events: none; }
.page.off-left  { transform: translateX(-100%); opacity: 0; pointer-events: none; }

/* ── SHARED BRAND ── */
.brand {
  position: absolute; top: 20px; right: 28px;
  display: flex; align-items: center; gap: 8px;
  font-size: 18px; font-weight: 700; z-index: 5;
}
.brand .ex  { color: #111; }
.brand .bud { color: var(--green); }
.brand-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg,#2980b9,#2ecc71);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.brand-icon svg { width: 20px; height: 20px; fill: #fff; }

/* ════════════════════════════════════
   PAGE 1 – CATEGORIES
════════════════════════════════════ */
#pg-categories {
  display: flex; flex-direction: column;
  padding: 36px 40px; gap: 36px;
}

.section { display: flex; flex-direction: column; gap: 12px; }
.section-title { font-size: 22px; font-weight: 700; }
.section-title.income  { color: var(--green); }
.section-title.expense { color: var(--red); }

.carousel-row { display: flex; align-items: center; gap: 10px; }

.arrow-btn {
  flex-shrink: 0; width: 44px; height: 44px;
  border: none; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  transition: background .15s, transform .15s;
}
.arrow-btn:hover  { background: #f0f0f0; transform: scale(1.1); }
.arrow-btn:active { transform: scale(.94); }
.arrow-btn:disabled { opacity: .22; cursor: default; }
.arrow-btn:disabled:hover { background: none; transform: none; }
.arrow-btn svg { width: 30px; height: 30px; }

/* viewport — fixed width = exactly 5 cards */
.c-viewport {
  width: calc(5 * var(--card) + 4 * var(--gap)); /* 520px */
  overflow: hidden; flex-shrink: 0;
}

.c-track {
  display: flex; gap: var(--gap);
  transition: transform .38s cubic-bezier(.4,0,.2,1);
}

/* ── ICON CARD ── */
.icon-card {
  flex-shrink: 0;
  width: var(--card); height: var(--card);
  border-radius: 50%; border: 2.5px solid #ddd;
  background: #fff; position: relative;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: border-color .2s, box-shadow .2s, transform .18s;
}
.icon-card:hover {
  border-color: #aaa; transform: translateY(-4px);
  box-shadow: 0 8px 22px rgba(0,0,0,.12);
}
.icon-card.selected {
  border: 3px solid var(--blue);
  box-shadow: 0 0 0 5px rgba(0,188,212,.15);
}
.icon-card svg { width: 50px; height: 50px; }
.icon-card::after {
  content: attr(data-label);
  position: absolute; bottom: -22px;
  left: 50%; transform: translateX(-50%);
  font-size: 10px; white-space: nowrap; color: #666;
  opacity: 0; transition: opacity .2s; pointer-events: none;
}
.icon-card:hover::after { opacity: 1; }

/* dots */
.dots { display: flex; gap: 6px; margin-top: 4px; padding-left: 54px; }
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #ddd; cursor: pointer;
  transition: background .25s, transform .25s;
}
.dot.on { background: #888; transform: scale(1.45); }

/* ADD CATEGORY btn */
.fab {
  position: absolute; bottom: 32px; right: 32px;
  background: var(--blue); color: #fff;
  font-family: 'Poppins', sans-serif;
  font-weight: 700; font-size: 14px; letter-spacing: .07em;
  border: none; border-radius: 50px; padding: 18px 36px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(0,188,212,.38);
  transition: background .2s, transform .15s, box-shadow .2s;
}
.fab:hover {
  background: #0097a7; transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(0,188,212,.5);
}

/* ════════════════════════════════════
   PAGE 2 – ADD NEW CATEGORY
════════════════════════════════════ */
#pg-add {
  display: flex; flex-direction: column;
}

/* top bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 36px 16px;
  flex-shrink: 0;
}
.tb-btn {
  font-family: 'Poppins', sans-serif;
  font-size: 17px; font-weight: 700;
  background: none; border: none; cursor: pointer;
  color: #111; padding: 4px 0;
  transition: opacity .2s;
}
.tb-btn:hover { opacity: .55; }

/* blue banner */
.add-banner {
  align-self: center;
  background: var(--blue); color: #fff;
  font-weight: 700; font-size: 22px;
  padding: 16px 48px; border-radius: 14px;
  margin-bottom: 36px; flex-shrink: 0;
  box-shadow: 0 4px 18px rgba(0,188,212,.35);
}

/* form body */
.add-form {
  flex: 1; padding: 0 56px;
  display: flex; flex-direction: column; gap: 30px;
  overflow-y: auto;
}

.form-row { display: flex; align-items: center; gap: 20px; }

.f-label {
  font-size: 18px; font-weight: 700; color: #111;
  min-width: 100px; letter-spacing: .02em;
}

/* TYPE pills */
.type-pill {
  font-family: 'Poppins', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: .09em;
  padding: 11px 30px; border-radius: 50px;
  border: none; cursor: pointer;
  background: #b0b0b0; color: #fff;
  transition: background .2s, transform .15s, box-shadow .15s;
}
.type-pill:hover { transform: scale(1.05); }
.type-pill.sel-income  { background: var(--green); box-shadow: 0 4px 14px rgba(46,204,113,.35); }
.type-pill.sel-expense { background: var(--red);   box-shadow: 0 4px 14px rgba(231,76,60,.35); }

/* NAME field */
.name-field {
  font-family: 'Poppins', sans-serif;
  font-size: 15px; font-weight: 500;
  padding: 14px 26px; border-radius: 50px;
  border: none; background: #b0b0b0; color: #fff;
  outline: none; width: 340px;
  transition: background .2s, box-shadow .2s;
}
.name-field::placeholder { color: rgba(255,255,255,.65); }
.name-field:focus { background: #888; box-shadow: 0 0 0 3px rgba(0,188,212,.3); }

/* icon picker label */
.pick-label {
  font-size: 18px; font-weight: 700; color: #111;
  letter-spacing: .02em;
}

/* add-page icon carousel — show 6 icons */
.add-c-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
.add-c-vp {
  width: calc(6 * var(--card) + 5 * var(--gap)); /* 628px */
  overflow: hidden; flex-shrink: 0;
}

/* toast */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #333; color: #fff;
  font-size: 14px; font-weight: 600;
  padding: 12px 28px; border-radius: 50px;
  opacity: 0; pointer-events: none;
  transition: opacity .3s, transform .3s;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

const cats = {
  inc: { icons: ICONS.slice(0,12).map(i=>({...i})), offset:0, sel:null },
  exp: { icons: ICONS.slice(12,24).map(i=>({...i})), offset:0, sel:null },
};

function makeCard(id, ic, onClick) {
  const d = document.createElement('div');
  d.className = 'icon-card';
  d.id = id;
  d.setAttribute('data-label', ic.label);
  d.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
    stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${ic.svg}</svg>`;
  d.addEventListener('click', onClick);
  return d;
}

function buildCatTrack(t) {
  const { icons } = cats[t];
  const track = document.getElementById(`${t}-track`);
  track.innerHTML = '';
  icons.forEach((ic, i) => {
    track.appendChild(makeCard(`${t}-c${i}`, ic, () => catSelect(t, i)));
  });
  buildCatDots(t);
  catArrows(t);
  catMove(t);
}

function catMove(t) {
  document.getElementById(`${t}-track`).style.transform = `translateX(-${cats[t].offset * STEP}px)`;
}
function catMax(t) { return Math.max(0, cats[t].icons.length - CAT_VISIBLE); }

function catShift(t, dir) {
  cats[t].offset = Math.max(0, Math.min(catMax(t), cats[t].offset + dir));
  catMove(t); catArrows(t); catDotsUpdate(t);
}
function catArrows(t) {
  document.getElementById(`${t}-prev`).disabled = cats[t].offset === 0;
  document.getElementById(`${t}-next`).disabled = cats[t].offset >= catMax(t);
}
function buildCatDots(t) {
  const pages = Math.ceil(cats[t].icons.length / CAT_VISIBLE);
  const c = document.getElementById(`${t}-dots`);
  c.innerHTML = '';
  for (let i = 0; i < pages; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i===0?' on':'');
    d.addEventListener('click', () => {
      cats[t].offset = Math.min(i * CAT_VISIBLE, catMax(t));
      catMove(t); catArrows(t); catDotsUpdate(t);
    });
    c.appendChild(d);
  }
}
function catDotsUpdate(t) {
  const p = Math.floor(cats[t].offset / CAT_VISIBLE);
  document.querySelectorAll(`#${t}-dots .dot`).forEach((d,i)=>d.classList.toggle('on', i===p));
}
function catSelect(t, idx) {
  if (cats[t].sel !== null) {
    const el = document.getElementById(`${t}-c${cats[t].sel}`);
    if (el) el.classList.remove('selected');
  }
  cats[t].sel = idx;
  document.getElementById(`${t}-c${idx}`).classList.add('selected');
}

buildCatTrack('inc');
buildCatTrack('exp');

/* ─────────────────────────────────────────────
   PAGE NAVIGATION
───────────────────────────────────────────── */
function openAddPage() {
  resetAddForm();
  document.getElementById('pg-categories').className = 'page off-left';
  document.getElementById('pg-add').className = 'page active';
}
function closePage() {
  document.getElementById('pg-add').className = 'page off-right';
  document.getElementById('pg-categories').className = 'page active';
}

/* ─────────────────────────────────────────────
   PAGE 2  –  ADD FORM
───────────────────────────────────────────── */
const ADD_VISIBLE = 6;
const addSt = { type:'income', icon:null, offset:0 };

function resetAddForm() {
  document.getElementById('cat-name').value = '';
  addSt.type = 'income'; addSt.icon = null; addSt.offset = 0;
  pickType('income');
  buildAddTrack();
}

function pickType(t) {
  addSt.type = t;
  document.getElementById('pill-inc').className = 'type-pill' + (t==='income'?' sel-income':'');
  document.getElementById('pill-exp').className = 'type-pill' + (t==='expense'?' sel-expense':'');
}

function buildAddTrack() {
  const track = document.getElementById('add-track');
  track.innerHTML = '';
  ICONS.forEach((ic, i) => {
    track.appendChild(makeCard(`add-c${i}`, ic, () => {
      document.querySelectorAll('#add-track .icon-card').forEach(c=>c.classList.remove('selected'));
      document.getElementById(`add-c${i}`).classList.add('selected');
      addSt.icon = i;
    }));
  });
  addSt.offset = 0;
  addMove(); addArrows(); buildAddDots();
}

function addMove() {
  document.getElementById('add-track').style.transform = `translateX(-${addSt.offset * STEP}px)`;
}
function addMax() { return Math.max(0, ICONS.length - ADD_VISIBLE); }

function addShift(dir) {
  addSt.offset = Math.max(0, Math.min(addMax(), addSt.offset + dir));
  addMove(); addArrows(); addDotsUpdate();
}
function addArrows() {
  document.getElementById('add-prev').disabled = addSt.offset === 0;
  document.getElementById('add-next').disabled = addSt.offset >= addMax();
}
function buildAddDots() {
  const pages = Math.ceil(ICONS.length / ADD_VISIBLE);
  const c = document.getElementById('add-dots');
  c.innerHTML = '';
  for (let i = 0; i < pages; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i===0?' on':'');
    d.addEventListener('click', () => {
      addSt.offset = Math.min(i * ADD_VISIBLE, addMax());
      addMove(); addArrows(); addDotsUpdate();
    });
    c.appendChild(d);
  }
}
function addDotsUpdate() {
  const p = Math.floor(addSt.offset / ADD_VISIBLE);
  document.querySelectorAll('#add-dots .dot').forEach((d,i)=>d.classList.toggle('on', i===p));
}

/* ─────────────────────────────────────────────
   SAVE
───────────────────────────────────────────── */
function saveNew() {
  const name = document.getElementById('cat-name').value.trim();
  if (!name) {
    shake(document.getElementById('cat-name'));
    showToast('Please enter a name'); return;
  }
  if (addSt.icon === null) {
    showToast('Please select an icon'); return;
  }
  const t = addSt.type === 'income' ? 'inc' : 'exp';
  cats[t].icons.push({ label: name, svg: ICONS[addSt.icon].svg });
  buildCatTrack(t);
  // jump to last page so newly added icon is visible
  cats[t].offset = catMax(t);
  catMove(t); catArrows(t); catDotsUpdate(t);

  showToast(`"${name}" added!`);
  closePage();
}

/* helpers */
function shake(el) {
  el.style.transition = 'none';
  const s = [8,-8,6,-6,3,-3,0];
  s.forEach((v,i) => setTimeout(()=>{ el.style.transform=`translateX(${v}px)`; }, i*55));
  setTimeout(()=>{ el.style.transform=''; }, s.length*55+100);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}
</script>
