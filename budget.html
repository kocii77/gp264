<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseBuddy App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { display: flex; height: 100vh; background-color: #f7f9fc; }
        /* SIDEBAR */
        .sidebar {
            width: 200px;
            min-height: 100vh;
            background-color: black;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .nav-item {
            display: block;
            padding: 30px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .arrow {
            display: inline-block;
            margin-right: 10px;
            transition: 0.3s;
        }

        .nav-item:hover {
            background-color: #333;
            padding-left: 25px;
        }

        .nav-item:hover .arrow {
            transform: translateX(5px);
        }

        .nav-item:hover {
            background-color: #333;
        }

        /* Main Content */
        .main { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Dropdown */
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background: #555; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; }
        .drop-content { display: none; position: absolute; background: #fff; min-width: 120px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); z-index: 1; }
        .drop-content button { display: block; width: 100%; padding: 10px; border: none; background: none; cursor: pointer; text-align: left; }
        .drop-content button:hover { background: #eee; }
        .dropdown:hover .drop-content { display: block; }

        /* Dashboard Cards */
        .overview { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { flex: 1; background: #fff; padding: 20px; text-align: center; border: 2px solid #ddd; border-radius: 8px; }
        .categories { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .cat-card { width: 220px; padding: 20px; border-radius: 8px; text-align: center; color: #111; }
        .cat-card h1 { font-size: 40px; margin-bottom: 10px; }
        .cat-card h3 { margin-bottom: 15px; }
        .cat-card p { font-size: 14px; margin-bottom: 5px; font-weight: bold; }

        /* Utilities */
        .bg-blue { background: #40C4FF; } .bg-green { background: #00C853; } .bg-yellow { background: #FFD740; }
        .add-btn { background: #40C4FF; color: #fff; font-weight: bold; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; margin-top: auto; align-self: flex-end; }
        .add-btn:hover { background: #00B0FF; }
        #other-view { display: none; flex: 1; align-items: center; justify-content: center; flex-direction: column; color: #555; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2></h2>

       <a href="dashboard.php" class="nav-item">
            <span class="arrow">›</span> Home
        </a>

        <a href="analysis.html" class="nav-item">
            <span class="arrow">›</span> Analysis
        </a>

        <a href="addbudget.html" class="nav-item">
            <span class="arrow">›</span> Budget
        </a>

        <a href="categories.html" class="nav-item">
            <span class="arrow">›</span> Categories
        </a>

        <a href="settings.html" class="nav-item">
            <span class="arrow">›</span> Settings
        </a>
    </div>

    <div class="main">
        <div class="header">
            <div class="dropdown">
                <button class="dropbtn"><span id="period">MONTHLY</span> <span>▼</span></button>
                <div class="drop-content">
                    <button onclick="setPeriod('DAILY')">Daily</button>
                    <button onclick="setPeriod('WEEKLY')">Weekly</button>
                    <button onclick="setPeriod('FORTNIGHT')">Fortnight</button>
                    <button onclick="setPeriod('MONTHLY')">Monthly</button>
                </div>
            </div>
            <h2> ExpenseBuddy</h2>
        </div>

        <div id="dashboard-view" style="display: flex; flex-direction: column; flex: 1;">
            <div class="overview">
                <div class="card"><h3>TOTAL BUDGET</h3><h2 id="total-budget">RM 0.00</h2></div>
                <div class="card"><h3>TOTAL SPENT</h3><h2 id="total-spent">RM 0.00</h2></div>
            </div>
            <div class="categories" id="category-container"></div>
            <button class="add-btn" onclick="window.location.href='addbudget.html'">ADD BUDGET</button>
        </div>

        <div id="other-view">
            <h2 id="other-title">View</h2>
            <p>Content is under construction.</p>
        </div>
    </div>

    <script>
        let budgets = [
            { name: 'Food', limit: 0, spent: 25.50, color: 'bg-blue', icon: '🍿' },
            { name: 'Vehicle', limit: 0, spent: 60.00, color: 'bg-green', icon: '🚗' },
            { name: 'Clothes', limit: 0, spent: 40.00, color: 'bg-yellow', icon: '👕' }
        ];

        const renderUI = () => {
            let totalBudget = 0, totalSpent = 0;
            document.getElementById('category-container').innerHTML = budgets.map(b => {
                totalBudget += b.limit; totalSpent += b.spent;
                return `<div class="cat-card ${b.color}">
                            <h1>${b.icon}</h1><h3>${b.name}</h3>
                            <p>Limit: RM ${b.limit.toFixed(2)}</p><p>Spent: RM ${b.spent.toFixed(2)}</p>
                        </div>`;
            }).join('');
            document.getElementById('total-budget').innerText = `RM ${totalBudget.toFixed(2)}`;
            document.getElementById('total-spent').innerText = `RM ${totalSpent.toFixed(2)}`;
        };

        const addBudget = () => {
            let amt = parseFloat(prompt("Enter budget limit amount (e.g., 100):"));
            if (!amt || amt < 0) return alert("Invalid amount.");
            let cat = prompt("Enter category name (e.g., Groceries):") || "Misc";
            let exists = budgets.find(b => b.name.toLowerCase() === cat.toLowerCase());
            
            if (exists) exists.limit += amt;
            else budgets.push({ name: cat, limit: amt, spent: 0, color: ['bg-blue', 'bg-green', 'bg-yellow'][budgets.length % 3], icon: '💰' });
            renderUI();
        };

        const setPeriod = (period) => document.getElementById('period').innerText = period;

        const switchTab = (viewName, el) => {
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            el.classList.add('active');
            
            const isDash = viewName === 'Dashboard';
            document.getElementById('dashboard-view').style.display = isDash ? 'flex' : 'none';
            document.getElementById('other-view').style.display = isDash ? 'none' : 'flex';
            if (!isDash) document.getElementById('other-title').innerText = `${viewName} View`;
        };

        renderUI();
    </script>
</body>
</html>
