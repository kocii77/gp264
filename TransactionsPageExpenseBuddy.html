<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ExpenseBuddy | New Transactions</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #ecf0f5 0%, #dee4ed 100%);
      font-family: 'Inter', sans-serif;
      padding: 2rem 1.2rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .dashboard {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    /* card style */
    .card {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 3px rgba(0, 0, 0, 0.02);
      padding: 1.8rem 2rem;
      transition: all 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    /* header row : cancel + save */
    .form-actions-row {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-bottom: 1.8rem;
    }

    .btn-icon {
      padding: 0.6rem 1.4rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      background: #f0f4fa;
      color: #2c3e66;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Inter', sans-serif;
    }

    .btn-icon i {
      font-size: 0.9rem;
    }

    .btn-cancel {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #e0e7ef;
    }

    .btn-cancel:hover {
      background: #e6edf4;
      transform: translateY(-1px);
    }

    .btn-save {
      background: #1e4d3a;
      color: white;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
    }

    .btn-save:hover {
      background: #0f3c2c;
      transform: translateY(-2px);
    }

    /* 3 toggle buttons (expense, income, transfer) */
    .type-toggles {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      margin-bottom: 2rem;
      background: #f8fafd;
      border-radius: 3rem;
      padding: 0.5rem;
      box-shadow: inset 0 1px 2px #00000008, 0 2px 4px rgba(0,0,0,0.02);
    }

    .type-btn {
      flex: 1;
      text-align: center;
      padding: 0.7rem 0;
      border-radius: 2.5rem;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: 0.2s;
      color: #5b6e8c;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .type-btn i {
      font-size: 1rem;
    }

    .type-btn.active {
      background: white;
      color: #0f3c2c;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(16, 185, 129, 0.2);
    }

    .type-btn.expense.active { color: #b91c1c; background: #fff5f5; box-shadow: 0 4px 10px rgba(185,28,28,0.08);}
    .type-btn.income.active { color: #1e5f3a; background: #eef9f2; }
    .type-btn.transfer.active { color: #2c6280; background: #eef3fc; }

    /* form sections */
    .dynamic-section {
      margin-top: 1.2rem;
      transition: all 0.2s;
    }

    .field-group {
      margin-bottom: 1.6rem;
    }

    .field-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1e2a47;
      margin-bottom: 0.6rem;
    }

    .field-label i {
      color: #10b981;
      width: 1.2rem;
    }

    /* account selector (pill buttons) */
    .account-options {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .account-pill {
      background: #f0f4fe;
      border-radius: 2rem;
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      border: 1px solid #e2edf7;
      transition: all 0.2s;
      color: #2c3e66;
    }

    .account-pill i {
      font-size: 0.9rem;
    }

    .account-pill.active {
      background: #1e4d3a;
      border-color: #1e4d3a;
      color: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    /* category grid (icon selection) */
    .category-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 0.4rem;
    }

    .cat-item {
      background: #f8fafd;
      border: 1.5px solid #e2edf7;
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.85rem;
      font-weight: 500;
      color: #2b3b4c;
    }

    .cat-item i {
      font-size: 1rem;
      color: #5d7c9b;
    }

    .cat-item.active {
      background: #e9f5ef;
      border-color: #10b981;
      color: #0e6b3e;
    }

    .cat-item.active i {
      color: #0e6b3e;
    }

    input, textarea, select {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 1.2rem;
      border: 1.5px solid #e2edf7;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: 0.2s;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
    }

    .double-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .double-row .field-group {
      flex: 1;
    }

    .error-msg {
      background: #fee2e2;
      color: #b91c1c;
      padding: 0.7rem 1rem;
      border-radius: 1rem;
      font-size: 0.8rem;
      margin: 0.5rem 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .success-toast {
      background: #dcfce7;
      color: #15803d;
      padding: 0.7rem 1rem;
      border-radius: 1rem;
      font-size: 0.8rem;
      margin: 0.5rem 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .transaction-list {
      margin-top: 2rem;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .list-header h3 {
      font-weight: 600;
      color: #1f2e45;
    }

    .transactions-container {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      max-height: 340px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .transaction-row {
      background: white;
      border-radius: 1.2rem;
      padding: 0.8rem 1.1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      border: 1px solid #eef2fa;
      transition: 0.1s;
    }

    .tx-details {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex-wrap: wrap;
    }

    .tx-icon {
      width: 38px;
      height: 38px;
      background: #eff3f9;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .tx-info {
      display: flex;
      flex-direction: column;
    }

    .tx-desc {
      font-weight: 700;
      font-size: 0.9rem;
    }

    .tx-meta {
      font-size: 0.7rem;
      color: #7c8ea0;
      display: flex;
      gap: 0.7rem;
    }

    .tx-amount {
      font-weight: 700;
    }

    .delete-tx {
      background: none;
      border: none;
      font-size: 1.2rem;
      color: #b9c4dc;
      cursor: pointer;
      padding: 0.3rem;
      border-radius: 2rem;
    }

    .delete-tx:hover { color: #dc2626; background: #fee2e2; }

    .empty-list {
      text-align: center;
      padding: 2rem;
      background: #fafcff;
      border-radius: 1.5rem;
      color: #8896ab;
    }

    hr {
      margin: 0.8rem 0;
      border: none;
      height: 1px;
      background: #e4ecf5;
    }

    @media (max-width: 560px) {
      .card { padding: 1.3rem; }
      .type-btn { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="card">
    <!-- top cancel / save row -->
    <div class="form-actions-row">
      <button class="btn-icon btn-cancel" id="globalCancelBtn"><i class="fas fa-times"></i> Cancel</button>
      <button class="btn-icon btn-save" id="globalSaveBtn"><i class="fas fa-save"></i> Save</button>
    </div>

    <!-- Type Toggle: EXPENSE / INCOME / TRANSFER -->
    <div class="type-toggles">
      <button class="type-btn expense" data-type="expense"><i class="fas fa-arrow-down"></i> EXPENSE</button>
      <button class="type-btn income" data-type="income"><i class="fas fa-arrow-up"></i> INCOME</button>
      <button class="type-btn transfer" data-type="transfer"><i class="fas fa-exchange-alt"></i> TRANSFER</button>
    </div>

    <!-- Dynamic form sections will be injected / shown here -->
    <div id="dynamicFormContainer"></div>
    <div id="formFeedback"></div>
  </div>

  <!-- Transaction history -->
  <div class="transaction-list">
    <div class="list-header">
      <h3><i class="fas fa-history"></i> Transactions List</h3>
      <span id="totalTxAmount" style="font-size:0.8rem; background:#eef2fa; padding:0.2rem 0.9rem; border-radius:2rem;">Total: RM0.00</span>
    </div>
    <hr>
    <div id="transactionHistory" class="transactions-container">
      <div class="empty-list">No Transactions. Save your first record!</div>
    </div>
  </div>
</div>

<script>
  // ---------- GLOBAL VARIABLES ----------
  let currentType = "expense";   // expense, income, transfer
  // data: account selection for expense/income (single)
  let selectedAccount = "card";     // 'card', 'cash', 'savings'
  // transfer specific
  let fromAccount = "card";
  let toAccount = "cash";
  // category (only for expense/income)
  let selectedCategory = "food";     // default category key
  
  // list of saved transactions
  let transactions = [];
  
  // category definitions (icon class + label)
  const CATEGORIES = {
    expense: [
      { id: "food", label: "Foods & Beverages", icon: "fa-utensils" },
      { id: "transport", label: "Transport", icon: "fa-car" },
      { id: "shopping", label: "Shopping", icon: "fa-cart-shopping" },
      { id: "bills", label: "Bills", icon: "fa-file-invoice-dollar" },
      { id: "entertain", label: "Leisure", icon: "fa-film" },
      { id: "health", label: "Health", icon: "fa-heartbeat" },
      { id: "other_exp", label: "Others", icon: "fa-ellipsis-h" }
    ],
    income: [
      { id: "salary", label: "Salary", icon: "fa-money-bill-wave" },
      { id: "freelance", label: "Freelance", icon: "fa-laptop-code" },
      { id: "allowance", label: "Allowance", icon: "fa-gift" },
      { id: "business", label: "Business", icon: "fa-store" },
      { id: "investment", label: "Investment", icon: "fa-chart-line" },
      { id: "other_inc", label: "Others", icon: "fa-coins" }
    ]
  };
  
  // flat categories for rendering (based on current type)
  function getCurrentCategories() {
    return currentType === "expense" ? CATEGORIES.expense : CATEGORIES.income;
  }
  
  // account options
  const ACCOUNTS = [
    { id: "card", label: "Credit / Debit", icon: "fa-credit-card" },
    { id: "cash", label: "Cash", icon: "fa-money-bill" },
    { id: "savings", label: "Savings", icon: "fa-piggy-bank" }
  ];
  
  // DOM elements refs
  const dynamicContainer = document.getElementById("dynamicFormContainer");
  const feedbackDiv = document.getElementById("formFeedback");
  const historyDiv = document.getElementById("transactionHistory");
  const totalSpan = document.getElementById("totalTxAmount");
  
  let timeoutId = null;
  function showMessage(msg, isError = false) {
    if (timeoutId) clearTimeout(timeoutId);
    feedbackDiv.innerHTML = isError 
      ? `<div class="error-msg"><i class="fas fa-exclamation-circle"></i> ${msg}</div>`
      : `<div class="success-toast"><i class="fas fa-check-circle"></i> ${msg}</div>`;
    timeoutId = setTimeout(() => { if (feedbackDiv) feedbackDiv.innerHTML = ''; }, 2800);
  }
  
  function clearFeedback() { if (timeoutId) clearTimeout(timeoutId); feedbackDiv.innerHTML = ''; }
  
  // ----- Helper: format Ringgit Malaysia -----
  function formatMYR(amount) {
    return new Intl.NumberFormat('ms-MY', { style: 'currency', currency: 'MYR', minimumFractionDigits: 2 }).format(amount);
  }
  
  // ----- RENDER DYNAMIC FORM BASED ON currentType -----
  function renderForm() {
    if (!dynamicContainer) return;
    if (currentType === "expense" || currentType === "income") {
      // Expense / Income layout: Account + Category + Notes + Amount + Date
      dynamicContainer.innerHTML = `
        <div class="dynamic-section">
          <!-- Account selection -->
          <div class="field-group">
            <div class="field-label"><i class="fas fa-wallet"></i> Account</div>
            <div class="account-options" id="accountOptionsList"></div>
          </div>
          <!-- Category selection (icon grid) -->
          <div class="field-group">
            <div class="field-label"><i class="fas fa-tags"></i> Category</div>
            <div class="category-grid" id="categoryGrid"></div>
          </div>
          <!-- Notes -->
          <div class="field-group">
            <div class="field-label"><i class="fas fa-pen"></i> Add Notes</div>
            <textarea id="notesInput" rows="2" placeholder="Extra notes (e.g., clothing shopping, game top up...)" style="resize: vertical;"></textarea>
          </div>
          <div class="double-row">
            <div class="field-group">
              <div class="field-label"><i class="fas fa-money-bill-wave"></i> Amount (RM)</div>
              <input type="number" id="amountInput" step="0.01" min="0.01" placeholder="0.00">
            </div>
            <div class="field-group">
              <div class="field-label"><i class="fas fa-calendar"></i> Date</div>
              <input type="date" id="dateInput">
            </div>
          </div>
        </div>
      `;
      // populate accounts
      const accContainer = document.getElementById("accountOptionsList");
      ACCOUNTS.forEach(acc => {
        const btn = document.createElement("div");
        btn.className = `account-pill ${selectedAccount === acc.id ? 'active' : ''}`;
        btn.innerHTML = `<i class="fas ${acc.icon}"></i> ${acc.label}`;
        btn.addEventListener("click", () => {
          document.querySelectorAll("#accountOptionsList .account-pill").forEach(el => el.classList.remove("active"));
          btn.classList.add("active");
          selectedAccount = acc.id;
        });
        accContainer.appendChild(btn);
      });
      
      // populate category grid
      const catGrid = document.getElementById("categoryGrid");
      const categories = getCurrentCategories();
      categories.forEach(cat => {
        const catDiv = document.createElement("div");
        catDiv.className = `cat-item ${selectedCategory === cat.id ? 'active' : ''}`;
        catDiv.innerHTML = `<i class="fas ${cat.icon}"></i> ${cat.label}`;
        catDiv.addEventListener("click", () => {
          document.querySelectorAll("#categoryGrid .cat-item").forEach(el => el.classList.remove("active"));
          catDiv.classList.add("active");
          selectedCategory = cat.id;
        });
        catGrid.appendChild(catDiv);
      });
      
      // set default date today
      const dateField = document.getElementById("dateInput");
      if (!dateField.value) {
        const today = new Date().toISOString().slice(0,10);
        dateField.value = today;
      }
    } 
    else if (currentType === "transfer") {
      // Transfer layout: From Account / To Account + Notes + Amount + Date
      dynamicContainer.innerHTML = `
        <div class="dynamic-section">
          <div class="double-row">
            <div class="field-group">
              <div class="field-label"><i class="fas fa-arrow-right-from-bracket"></i> From Account</div>
              <div class="account-options" id="fromAccountList"></div>
            </div>
            <div class="field-group">
              <div class="field-label"><i class="fas fa-arrow-right-to-bracket"></i> Receiver Account</div>
              <div class="account-options" id="toAccountList"></div>
            </div>
          </div>
          <div class="field-group">
            <div class="field-label"><i class="fas fa-pen"></i> Add Notes</div>
            <textarea id="notesInput" rows="2" placeholder="Transfer notes (e.g., bills, savings)" style="resize: vertical;"></textarea>
          </div>
          <div class="double-row">
            <div class="field-group">
              <div class="field-label"><i class="fas fa-money-bill-wave"></i> Amount (RM)</div>
              <input type="number" id="amountInput" step="0.01" min="0.01" placeholder="0.00">
            </div>
            <div class="field-group">
              <div class="field-label"><i class="fas fa-calendar"></i> Date</div>
              <input type="date" id="dateInput">
            </div>
          </div>
        </div>
      `;
      // From account picker
      const fromContainer = document.getElementById("fromAccountList");
      ACCOUNTS.forEach(acc => {
        const pill = document.createElement("div");
        pill.className = `account-pill ${fromAccount === acc.id ? 'active' : ''}`;
        pill.innerHTML = `<i class="fas ${acc.icon}"></i> ${acc.label}`;
        pill.addEventListener("click", () => {
          document.querySelectorAll("#fromAccountList .account-pill").forEach(el => el.classList.remove("active"));
          pill.classList.add("active");
          fromAccount = acc.id;
        });
        fromContainer.appendChild(pill);
      });
      // To account picker
      const toContainer = document.getElementById("toAccountList");
      ACCOUNTS.forEach(acc => {
        const pill = document.createElement("div");
        pill.className = `account-pill ${toAccount === acc.id ? 'active' : ''}`;
        pill.innerHTML = `<i class="fas ${acc.icon}"></i> ${acc.label}`;
        pill.addEventListener("click", () => {
          document.querySelectorAll("#toAccountList .account-pill").forEach(el => el.classList.remove("active"));
          pill.classList.add("active");
          toAccount = acc.id;
        });
        toContainer.appendChild(pill);
      });
      const dateField = document.getElementById("dateInput");
      if (!dateField.value) {
        const today = new Date().toISOString().slice(0,10);
        dateField.value = today;
      }
    }
  }
  
  // ----- Save transaction logic -----
  function saveTransaction() {
    let amountVal = document.getElementById("amountInput")?.value.trim();
    let notesVal = document.getElementById("notesInput")?.value.trim() || "";
    let dateVal = document.getElementById("dateInput")?.value;
    if (!amountVal) {
      showMessage("Please enter a valid amount", true);
      return;
    }
    const amountNum = parseFloat(amountVal);
    if (isNaN(amountNum) || amountNum <= 0) {
      showMessage("Amount must be a positive number (RM)", true);
      return;
    }
    if (amountNum > 9999999) {
      showMessage("Amount is too large, please enter a reasonable value", true);
      return;
    }
    if (!dateVal) {
      dateVal = new Date().toISOString().slice(0,10);
    }
    
    let newTx = {
      id: Date.now(),
      type: currentType,
      amount: amountNum,
      notes: notesVal,
      date: dateVal,
    };
    
    if (currentType === "expense" || currentType === "income") {
      if (!selectedAccount) { showMessage("Please choose an account", true); return; }
      if (!selectedCategory) { showMessage("Please choose a category", true); return; }
      newTx.account = selectedAccount;
      newTx.category = selectedCategory;
      const catObj = getCurrentCategories().find(c => c.id === selectedCategory);
      newTx.categoryLabel = catObj ? catObj.label : selectedCategory;
      const accObj = ACCOUNTS.find(a => a.id === selectedAccount);
      newTx.accountLabel = accObj ? accObj.label : selectedAccount;
    } 
    else if (currentType === "transfer") {
      if (!fromAccount || !toAccount) { showMessage("Please choose both 'from' and 'receiver' accounts", true); return; }
      if (fromAccount === toAccount) { showMessage("Source and destination accounts cannot be the same", true); return; }
      newTx.fromAccount = fromAccount;
      newTx.toAccount = toAccount;
      const fromAcc = ACCOUNTS.find(a => a.id === fromAccount);
      const toAcc = ACCOUNTS.find(a => a.id === toAccount);
      newTx.fromLabel = fromAcc ? fromAcc.label : fromAccount;
      newTx.toLabel = toAcc ? toAcc.label : toAccount;
    }
    
    transactions.unshift(newTx);
    renderTransactionList();
    clearFormAfterSave();
    showMessage(`✅ Transaction (${currentType.toUpperCase()}) saved: ${formatMYR(amountNum)}`);
  }
  
  function clearFormAfterSave() {
    // reset input fields by re-rendering form, keep type same but reset selections
    if (currentType === "expense" || currentType === "income") {
      selectedAccount = "card";
      selectedCategory = getCurrentCategories()[0]?.id || "food";
    } else {
      fromAccount = "card";
      toAccount = "cash";
    }
    renderForm();  // fresh form
    // optional: also set notes & amount blank
    const notesEl = document.getElementById("notesInput");
    const amountEl = document.getElementById("amountInput");
    if (notesEl) notesEl.value = "";
    if (amountEl) amountEl.value = "";
    // set date to today after renderForm
    const dateEl = document.getElementById("dateInput");
    if (dateEl && !dateEl.value) {
      const today = new Date().toISOString().slice(0,10);
      dateEl.value = today;
    } else if (dateEl && dateEl.value === "") {
      dateEl.value = new Date().toISOString().slice(0,10);
    }
    clearFeedback();
  }
  
  function cancelForm() {
    // reset to defaults: clear notes, amount, set date today, reset accounts/category to default
    if (currentType === "expense" || currentType === "income") {
      selectedAccount = "card";
      selectedCategory = getCurrentCategories()[0]?.id || "food";
    } else {
      fromAccount = "card";
      toAccount = "cash";
    }
    renderForm();
    const notesEl = document.getElementById("notesInput");
    const amountEl = document.getElementById("amountInput");
    if (notesEl) notesEl.value = "";
    if (amountEl) amountEl.value = "";
    const dateEl = document.getElementById("dateInput");
    if (dateEl) dateEl.value = new Date().toISOString().slice(0,10);
    clearFeedback();
    showMessage("Form has been reset", false);
  }
  
  // ----- Transaction history rendering -----
  function renderTransactionList() {
    if (!historyDiv) return;
    if (transactions.length === 0) {
      historyDiv.innerHTML = `<div class="empty-list"><i class="fas fa-receipt"></i> No transactions. Save your first record!</div>`;
      totalSpan.innerText = `Total: RM0.00`;
      return;
    }
    let total = 0;
    let html = "";
    for (let tx of transactions) {
      total += tx.amount;
      let iconHtml = `<i class="fas ${tx.type === 'expense' ? 'fa-arrow-down' : (tx.type === 'income' ? 'fa-arrow-up' : 'fa-exchange-alt')}"></i>`;
      let detailStr = "";
      if (tx.type === "expense" || tx.type === "income") {
        const accLabel = tx.accountLabel || tx.account;
        const catLabel = tx.categoryLabel || tx.category;
        detailStr = `${accLabel} • ${catLabel}`;
      } else {
        detailStr = `${tx.fromLabel} → ${tx.toLabel}`;
      }
      const amountColor = tx.type === 'expense' ? '#b91c1c' : (tx.type === 'income' ? '#1e5f3a' : '#2c6280');
      html += `
        <div class="transaction-row">
          <div class="tx-details">
            <div class="tx-icon" style="background:#eef2fa;">${iconHtml}</div>
            <div class="tx-info">
              <div class="tx-desc">${tx.type.toUpperCase()} ${tx.notes ? `- ${escapeHtml(tx.notes.substring(0,30))}` : ''}</div>
              <div class="tx-meta">${detailStr} • ${formatDate(tx.date)}</div>
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:12px;">
            <span class="tx-amount" style="color:${amountColor}; font-weight:700;">${formatMYR(tx.amount)}</span>
            <button class="delete-tx" data-id="${tx.id}"><i class="fas fa-trash-alt"></i></button>
          </div>
        </div>
      `;
    }
    historyDiv.innerHTML = html;
    totalSpan.innerText = `Total: ${formatMYR(total)}`;
    document.querySelectorAll('.delete-tx').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        transactions = transactions.filter(t => t.id !== id);
        renderTransactionList();
        showMessage("Transaction deleted", false);
      });
    });
  }
  
  function formatDate(dateStr) {
    if (!dateStr) return "";
    const parts = dateStr.split('-');
    if (parts.length !== 3) return dateStr;
    return `${parts[2]}/${parts[1]}/${parts[0]}`;
  }
  
  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
  
  // ---- load demo data ----
  function loadDemoTransactions() {
    if (transactions.length === 0) {
      const today = new Date().toISOString().slice(0,10);
      transactions.push({
        id: 10001, type: "expense", amount: 42.50, notes: "Lunch with team", date: today,
        account: "card", accountLabel: "Credit / Debit", category: "food", categoryLabel: "Foods & Beverages"
      });
      transactions.push({
        id: 10002, type: "income", amount: 2500, notes: "April salary", date: today,
        account: "savings", accountLabel: "Savings", category: "salary", categoryLabel: "Salary"
      });
      renderTransactionList();
    }
  }
  
  // ---- type switching ----
  function setType(type) {
    currentType = type;
    // update UI toggle active class
    document.querySelectorAll('.type-btn').forEach(btn => {
      const btnType = btn.getAttribute('data-type');
      if (btnType === type) btn.classList.add('active');
      else btn.classList.remove('active');
    });
    // reset default selections
    if (type === "expense" || type === "income") {
      selectedAccount = "card";
      selectedCategory = getCurrentCategories()[0]?.id || "food";
    } else {
      fromAccount = "card";
      toAccount = "cash";
    }
    renderForm();
    clearFeedback();
  }
  
  // ---- EVENT LISTENERS & INIT ----
  function bindGlobalEvents() {
    document.getElementById("globalCancelBtn")?.addEventListener("click", cancelForm);
    document.getElementById("globalSaveBtn")?.addEventListener("click", saveTransaction);
    document.querySelectorAll('.type-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const type = btn.getAttribute('data-type');
        setType(type);
      });
    });
  }
  
  function init() {
    loadDemoTransactions();
    setType("expense");
    bindGlobalEvents();
  }
  
  init();
</script>
</body>
</html>
